name: _tag-release

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      github-token:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          TAG_PREFIX=$(echo "$PACKAGE_NAME" | sed 's/.*\///')
          git tag "${TAG_PREFIX}@v${{ inputs.version }}"
          git push origin "${TAG_PREFIX}@v${{ inputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}
